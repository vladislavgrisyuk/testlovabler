        {onBack && (
          <IconBtn onClick={onBack} title="Назад" className="md:hidden"><ArrowLeft className="h-4 w-4" /></IconBtn>
        )}
        <div className="min-w-0 flex-1">
          <div className="font-serif-display text-lg leading-none text-ink">Разбор</div>
          <div className="mt-1 text-[11px] text-muted-foreground">Заметки на полях к вашим сообщениям</div>
        </div>
        <IconBtn onClick={onClose} title="Скрыть панель" className="hidden md:grid"><X className="h-4 w-4" /></IconBtn>
      </div>

      <div className="flex-1 overflow-y-auto no-scrollbar px-5 py-4 sm:px-6">
        <div className="flex flex-col gap-10">
          {cards.map((c) => (
            <CorrectorCardView key={c.id} c={c} active={activeMsgId === c.msgId} onJump={() => onJump(c.msgId)} />
          ))}
        </div>
      </div>

      <div className="px-5 py-4 sm:px-6">
        <div className="font-serif italic text-[12px] text-muted-foreground">сегодня</div>
        <dl className="mt-1 flex items-baseline gap-5 text-[13px] text-ink">
