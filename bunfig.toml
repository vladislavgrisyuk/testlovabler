// ---------- Primitives ----------
function Avatar({ src, alt, size = 40, online }: { src: string; alt: string; size?: number; online?: boolean }) {
  return (
    <div className="relative shrink-0" style={{ width: size, height: size }}>
      <img
        src={src} alt={alt} width={size} height={size} loading="lazy"
        className="h-full w-full rounded-full object-cover"
      />
      {online && (
        <span
          className="absolute right-0 bottom-0 block rounded-full bg-ok ring-2 ring-surface"
          style={{ width: Math.max(8, size * 0.22), height: Math.max(8, size * 0.22) }}
          aria-hidden
        />
      )}
    </div>
  );
}

function IconBtn({ children, onClick, title, className = "" }: { children: ReactNode; onClick?: () => void; title?: string; className?: string }) {
  return (
    <button
      onClick={onClick} title={title} type="button"
      className={`grid h-8 w-8 place-items-center rounded-full text-muted-foreground transition-colors hover:bg-subtle hover:text-ink ${className}`}
    >
      {children}
    </button>
  );
}

const LIST_PANEL = { min: 260, default: 316, max: 460 };
const CORRECTOR_PANEL = { min: 280, default: 360, max: 540 };
const CENTER_PANEL_MIN = 430;
const RESIZE_RAIL_TOTAL = 20;

function clamp(n: number, min: number, max: number) {
  return Math.min(Math.max(n, min), Math.max(min, max));
}

function ResizeRail({ label, onPointerDown }: { label: string; onPointerDown: (e: ReactPointerEvent<HTMLDivElement>) => void }) {
  return (
    <div
      role="separator"
      aria-orientation="vertical"
      aria-label={label}
      onPointerDown={onPointerDown}
      className="group relative z-10 h-full cursor-col-resize touch-none bg-transparent"
    >
      <div className="absolute inset-y-0 left-1/2 w-px -translate-x-1/2 bg-transparent transition-colors group-hover:bg-ink/10" />
    </div>
  );
}

// ---------- Modal ----------
function Modal({ open, onClose, title, subtitle, children, footer, size = "md" }: {
  open: boolean; onClose: () => void; title: string; subtitle?: string;
  children: ReactNode; footer?: ReactNode; size?: "sm" | "md" | "lg";
}) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e: KeyboardEvent) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [open, onClose]);
  if (!open) return null;
  const w = size === "sm" ? "max-w-sm" : size === "lg" ? "max-w-2xl" : "max-w-md";
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center p-0 sm:items-center sm:p-4">
      <div className="absolute inset-0 bg-ink/40 backdrop-blur-[2px]" onClick={onClose} />
      <div className={`relative z-10 flex w-full ${w} max-h-[100dvh] flex-col overflow-hidden rounded-t-xl bg-card shadow-2xl sm:max-h-[90vh] sm:rounded-xl`}>
        <div className="flex shrink-0 items-start justify-between gap-4 px-5 pt-4 pb-3 sm:px-6 sm:pt-5 sm:pb-4">
          <div className="min-w-0">
            <h2 className="font-serif-display text-xl text-ink">{title}</h2>
            {subtitle && <p className="mt-0.5 truncate text-[13px] text-muted-foreground">{subtitle}</p>}
          </div>
          <IconBtn onClick={onClose} title="Закрыть"><X className="h-4 w-4" /></IconBtn>
        </div>
        <div className="flex-1 overflow-y-auto px-5 pb-5 sm:px-6 no-scrollbar">{children}</div>
        {footer && <div className="flex shrink-0 items-center justify-end gap-2 bg-surface px-5 py-3 pb-[max(12px,env(safe-area-inset-bottom))] sm:px-6">{footer}</div>}
      </div>
    </div>
  );
}

// ---------- Form fields ----------
function Field({ label, hint, children }: { label: string; hint?: string; children: ReactNode }) {
  return (
    <label className="mb-4 block">
      <div className="mb-1.5 text-[12px] font-medium text-ink">{label}</div>
      {children}
      {hint && <div className="mt-1 text-[11px] text-muted-foreground">{hint}</div>}
    </label>
  );
}
function TextInput(props: React.InputHTMLAttributes<HTMLInputElement>) {
  return (
    <input
      {...props}
      className={`w-full rounded-lg bg-subtle px-3 py-2 text-[14px] text-ink outline-none placeholder:text-muted-foreground focus:bg-white focus:ring-1 focus:ring-ink/20 ${props.className ?? ""}`}
    />
  );
}
function Select({ value, onChange, options }: { value: string; onChange: (v: string) => void; options: Array<{ value: string; label: string }> }) {
  return (
    <select
      value={value} onChange={(e) => onChange(e.target.value)}
      className="w-full appearance-none rounded-lg bg-subtle px-3 py-2 text-[14px] text-ink outline-none focus:bg-white focus:ring-1 focus:ring-ink/20"
    >
      {options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}
function Segment<T extends string>({ value, onChange, options }: { value: T; onChange: (v: T) => void; options: Array<{ value: T; label: string }> }) {
  return (
    <div className="flex rounded-lg bg-subtle p-0.5">
      {options.map((o) => (
        <button key={o.value} type="button" onClick={() => onChange(o.value)}
          className={`flex-1 rounded-md px-2 py-1.5 text-[13px] transition-colors ${
            value === o.value ? "bg-white text-ink shadow-sm" : "text-muted-foreground hover:text-ink"
          }`}>
          {o.label}
        </button>
      ))}
    </div>
  );
}
function Toggle({ checked, onChange, label }: { checked: boolean; onChange: (v: boolean) => void; label: string }) {
  return (
    <button type="button" onClick={() => onChange(!checked)}
      className="flex w-full items-center justify-between rounded-lg bg-subtle px-3 py-2.5 text-left hover:bg-muted">
      <span className="text-[14px] text-ink">{label}</span>
      <span className={`relative h-5 w-9 rounded-full transition-colors ${checked ? "bg-ink" : "bg-muted-foreground/30"}`}>
        <span className={`absolute top-0.5 h-4 w-4 rounded-full bg-white transition-all ${checked ? "left-4" : "left-0.5"}`} />
      </span>
    </button>
  );
}
function BtnPrimary(props: React.ButtonHTMLAttributes<HTMLButtonElement>) {
  return (
    <button
      {...props}
      className={`inline-flex items-center gap-1.5 rounded-lg bg-ink px-3.5 py-1.5 text-[13px] font-medium text-background hover:bg-ink/90 disabled:opacity-40 ${props.className ?? ""}`}
    />
  );
}
function BtnGhost(props: React.ButtonHTMLAttributes<HTMLButtonElement>) {
  return (
    <button
      {...props}
      className={`inline-flex items-center gap-1.5 rounded-lg px-3.5 py-1.5 text-[13px] font-medium text-muted-foreground hover:bg-subtle hover:text-ink ${props.className ?? ""}`}
    />
  );
}

// ---------- Sidebar ----------
function Sidebar({
  personas, activeId, onSelect, onNewChat, onOpenProfile, onOpenProvider, onCollapse,
}: {
  personas: Persona[]; activeId: string; onSelect: (id: string) => void;
  onNewChat: () => void; onOpenProfile: () => void; onOpenProvider: () => void;
  onCollapse?: () => void;
}) {
  const [q, setQ] = useState("");
  const filtered = useMemo(() => {
    const s = q.trim().toLowerCase();
    if (!s) return personas;
    return personas.filter((p) => p.name.toLowerCase().includes(s) || p.lastText.toLowerCase().includes(s));
  }, [q, personas]);

  return (
    <aside className="flex h-full w-full min-w-0 shrink-0 flex-col overflow-hidden bg-surface shadow-[1px_0_2px_rgba(20,20,30,0.03)]">
      <div className="flex items-center justify-between gap-2 px-5 pt-5 pb-3">
        <div className="min-w-0">
          <div className="font-serif-display text-2xl leading-none text-ink">Lingua</div>
          <div className="mt-1 truncate text-[11px] text-muted-foreground">AI-репетитор в чате</div>
        </div>
        <div className="flex shrink-0 items-center gap-1">
          <IconBtn onClick={onOpenProvider} title="AI-провайдер"><Sliders className="h-4 w-4" /></IconBtn>
          <IconBtn onClick={onNewChat} title="Новый чат" className="bg-ink text-background hover:bg-ink/90 hover:text-background">
            <Plus className="h-4 w-4" />
          </IconBtn>
          {onCollapse && (
            <IconBtn onClick={onCollapse} title="Свернуть панель" className="hidden md:grid">
              <PanelLeftClose className="h-4 w-4" />
            </IconBtn>
          )}
        </div>
      </div>

      <div className="px-4 pb-3">
        <label className="flex items-center gap-2 rounded-lg bg-subtle px-3 py-1.5">
          <Search className="h-3.5 w-3.5 text-muted-foreground" />
          <input
            value={q} onChange={(e) => setQ(e.target.value)}
            placeholder="Поиск"
            className="w-full bg-transparent text-[13.5px] outline-none placeholder:text-muted-foreground"
          />
        </label>
      </div>

      <nav className="flex-1 overflow-y-auto no-scrollbar">
        <ul className="px-2 pb-4">
          {filtered.map((p) => (
            <li key={p.id}>
              <ChatRow p={p} active={p.id === activeId} onClick={() => onSelect(p.id)} />
            </li>
          ))}
          {filtered.length === 0 && (
            <li className="px-3 py-10 text-center text-sm text-muted-foreground">Ничего не найдено</li>
          )}
        </ul>
      </nav>

      <button
        onClick={onOpenProfile}
        className="flex items-center gap-3 bg-surface px-4 py-3 text-left hover:bg-subtle"
      >
        <Avatar src={avMe} alt="Вы" size={36} online />
        <div className="min-w-0 flex-1">
          <div className="truncate text-[13.5px] text-ink">Alex Petrov</div>
          <div className="truncate text-[11.5px] text-muted-foreground">учит 3 языка · B1</div>
        </div>
        <Settings className="h-4 w-4 text-muted-foreground" />
      </button>
    </aside>
  );
}

function ChatRow({ p, active, onClick }: { p: Persona; active: boolean; onClick: () => void }) {
  return (
    <button
      onClick={onClick}
      className={`flex w-full items-start gap-3 rounded-xl px-2.5 py-2 text-left transition-all ${
        active ? "bg-white shadow-[0_1px_2px_rgba(20,20,30,0.05),0_2px_8px_-4px_rgba(20,20,30,0.06)]" : "hover:bg-white/60"
      }`}
    >
      <Avatar src={p.avatar} alt={p.name} size={44} online={p.online} />
      <div className="min-w-0 flex-1">
        <div className="flex items-baseline justify-between gap-2">
          <span className="truncate text-[14px] font-medium text-ink">{p.name}</span>
          <span className="shrink-0 text-[11px] text-muted-foreground">{p.lastTime}</span>
        </div>
        <div className="mt-0.5 flex items-center justify-between gap-2">
          <p className="truncate text-[12.5px] text-muted-foreground">{p.lastText}</p>
          <span className="flex shrink-0 items-center gap-1">
            {p.muted && <BellOff className="h-3 w-3 text-muted-foreground" />}
            {p.unread ? (
              <span className="rounded-full bg-ink px-1.5 py-0.5 text-[10px] font-medium text-background">{p.unread}</span>
            ) : null}
          </span>
        </div>
        <div className="mt-0.5 text-[10.5px] uppercase tracking-wider text-muted-foreground">{p.lang} · {p.level}</div>
      </div>
    </button>
  );
}

// ---------- Center ----------
function ConversationHeader({
  p, onToggleCorrector, correctorOpen, onOpenChatSettings, onBack, notesCount, onExpandList,
}: {
  p: Persona; onToggleCorrector: () => void; correctorOpen: boolean;
  onOpenChatSettings: () => void; onBack?: () => void; notesCount?: number;
  onExpandList?: () => void;
}) {
  return (
    <header className="flex items-center justify-between gap-2 bg-background px-3 py-2.5 shadow-[0_1px_2px_rgba(20,20,30,0.03)] sm:px-6 sm:py-3">
      <div className="flex min-w-0 flex-1 items-center gap-1">
        {onBack && (
          <IconBtn onClick={onBack} title="Назад" className="md:hidden"><ArrowLeft className="h-4 w-4" /></IconBtn>
        )}
        {onExpandList && (
          <IconBtn onClick={onExpandList} title="Показать список" className="hidden md:grid">
            <PanelLeftOpen className="h-4 w-4" />
          </IconBtn>
        )}
        <button onClick={onOpenChatSettings} className="flex min-w-0 flex-1 items-center gap-3 rounded-lg px-1 py-1 text-left hover:bg-subtle">
          <Avatar src={p.avatar} alt={p.name} size={38} online={p.online} />
          <div className="min-w-0">
            <div className="truncate text-[14px] font-medium text-ink">{p.name}</div>
            <div className="truncate text-[11.5px] text-muted-foreground">
              {p.online ? "в сети" : "был(а) недавно"} · {p.role}
            </div>
          </div>
        </button>
      </div>
      <div className="flex shrink-0 items-center gap-1">
        <IconBtn onClick={onOpenChatSettings} title="Настройки чата" className="hidden md:grid"><MoreHorizontal className="h-4 w-4" /></IconBtn>
        <button
          onClick={onToggleCorrector}
          title={correctorOpen ? "Скрыть разбор" : "Показать разбор"}
          className="relative grid h-9 w-9 place-items-center rounded-full text-muted-foreground hover:bg-subtle hover:text-ink"
        >
          <BookOpen className="h-4 w-4" />
          {notesCount ? (
            <span className="absolute -top-0.5 -right-0.5 grid h-4 min-w-4 place-items-center rounded-full bg-accent-ink px-1 text-[10px] font-medium text-background">
              {notesCount}
            </span>
          ) : null}
