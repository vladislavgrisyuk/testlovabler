function CorrectorCardView({ c, active, onJump }: { c: CorrectorCard; active: boolean; onJump: () => void }) {
  if (c.status === "clean") {
    return (
      <button onClick={onJump} className={`block w-full text-left ${active ? "opacity-100" : "opacity-90"}`}>
        <div className="font-serif italic text-[12.5px] text-muted-foreground">— без замечаний</div>
        <p className="mt-1 line-clamp-2 font-serif italic text-[14px] text-muted-foreground">{c.original}</p>
      </button>
    );
  }

  return (
    <article className={`block ${active ? "" : ""}`}>
      <button onClick={onJump} className="mb-2 block text-left">
        <div className="font-serif italic text-[12.5px] text-muted-foreground">
          заметки к сообщению <span className="text-ink">·</span> {c.notes?.length}
        </div>
      </button>

      <p className="font-serif italic text-[13.5px] leading-relaxed text-muted-foreground">
        {c.original}
      </p>

      <p className="mt-3 text-[15px] leading-relaxed text-ink">
        {c.corrected?.parts.map((p, i) => {
          if (p.kind === "del") return <span key={i} className="text-muted-foreground line-through decoration-muted-foreground/50">{p.t}</span>;
          if (p.kind === "add") return <span key={i} className="text-ink" style={{ boxShadow: "inset 0 -1px 0 var(--color-accent-ink)" }}>{p.t}</span>;
          return <span key={i}>{p.t}</span>;
        })}
      </p>

      <ol className="mt-5 space-y-4">
        {c.notes?.map((n) => (
          <li key={n.n} className="grid grid-cols-[24px_minmax(0,1fr)] gap-x-2">
            <span className="pt-0.5 text-right font-serif italic text-[13px] text-muted-foreground">{n.n}.</span>
            <div className="min-w-0">
              <div className="text-[13.5px] text-ink">{n.title}</div>
              <p className="mt-0.5 text-[12.5px] leading-relaxed text-muted-foreground">{n.body}</p>
              <p className="mt-1 font-serif italic text-[13px] text-ink">{n.example}</p>
            </div>
          </li>
        ))}
      </ol>
    </article>
  );
}

