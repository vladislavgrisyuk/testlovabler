  );
}

function DayDivider({ label }: { label: string }) {
  return (
    <div className="my-4 flex justify-center">
      <span className="rounded-full bg-card/70 px-2.5 py-0.5 text-[10.5px] uppercase tracking-wider text-muted-foreground backdrop-blur-sm">{label}</span>
    </div>
  );
}


function Bubble({ m, onClick, active }: { m: Msg; onClick?: () => void; active?: boolean }) {
  const isUser = m.from === "user";
  return (
    <div className={`flex ${isUser ? "justify-end" : "justify-start"}`}>
      <button
        onClick={onClick}
        className={`group relative max-w-[72%] min-w-[80px] rounded-xl px-3.5 py-2 text-[14.5px] leading-relaxed shadow-[0_1px_1px_rgba(20,20,30,0.04),0_2px_6px_-2px_rgba(20,20,30,0.08)] transition-all ${
          isUser
            ? "rounded-br-md bg-ink text-background"
            : "rounded-bl-md bg-card/90 text-ink backdrop-blur-sm"
        } ${active ? (isUser ? "bg-accent-ink" : "bg-card") : ""}`}
      >
        <p className="whitespace-pre-wrap text-left">
          {m.text}
          <span
            aria-hidden
            className={`float-right ml-3 translate-y-[6px] text-[10.5px] leading-none tabular-nums ${
              isUser ? "text-background/60" : "text-muted-foreground"
            }`}
          >
            {m.time}
          </span>
        </p>
      </button>
    </div>
  );
}



function Composer({ onSend, placeholder }: { onSend: (t: string) => void; placeholder: string }) {
  const [v, setV] = useState("");
  const hasText = v.trim().length > 0;
  return (
    <div className="bg-background px-3 pt-3 pb-[max(12px,env(safe-area-inset-bottom))] sm:px-6 sm:pt-4 sm:pb-4">
      <form
        onSubmit={(e) => { e.preventDefault(); if (!v.trim()) return; onSend(v.trim()); setV(""); }}
        className="mx-auto flex max-w-3xl items-center gap-2 rounded-xl bg-subtle px-3 py-1.5 shadow-[0_1px_2px_rgba(20,20,30,0.04),0_4px_16px_-8px_rgba(20,20,30,0.08)] focus-within:bg-muted"
      >
        <textarea
          value={v} onChange={(e) => setV(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (v.trim()) { onSend(v.trim()); setV(""); } } }}
          rows={1} placeholder={placeholder}
          className="block max-h-40 min-h-[36px] flex-1 resize-none self-center bg-transparent px-1 py-2 text-[16px] leading-5 outline-none placeholder:text-muted-foreground sm:text-[14.5px]"
        />
        {hasText ? (
          <button
            type="submit"
            className="grid h-9 w-9 place-items-center rounded-full bg-ink text-background transition-opacity"
            aria-label="Отправить"
          >
            <Send className="h-3.5 w-3.5" />
          </button>
        ) : (
          <button
            type="button"
            onClick={() => { /* voice recording placeholder */ }}
            className="grid h-9 w-9 place-items-center rounded-full text-muted-foreground transition-colors hover:bg-muted hover:text-ink"
            aria-label="Голосовое сообщение"
          >
            <Mic className="h-4 w-4" />
          </button>
        )}
      </form>
      <div className="mx-auto mt-2 hidden max-w-3xl px-2 text-[10.5px] text-muted-foreground sm:block">
        Enter — отправить · Shift+Enter — новая строка
      </div>
    </div>
  );
}

function Center({
  p, messages, activeMsgId, onSelectMsg, onSend, onToggleCorrector, correctorOpen, onOpenChatSettings, onBack, notesCount, onExpandList,
}: {
  p: Persona; messages: Msg[]; activeMsgId: string | null;
  onSelectMsg: (id: string) => void; onSend: (t: string) => void;
  onToggleCorrector: () => void; correctorOpen: boolean; onOpenChatSettings: () => void;
  onBack?: () => void; notesCount?: number; onExpandList?: () => void;
}) {
  const scrollRef = useRef<HTMLDivElement>(null);
  const [showJump, setShowJump] = useState(false);

  useEffect(() => {
    const el = scrollRef.current; if (!el) return;
    const onScroll = () => setShowJump(el.scrollHeight - el.clientHeight - el.scrollTop > 200);
    el.addEventListener("scroll", onScroll);
    return () => el.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const el = scrollRef.current; if (!el) return;
    el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
  }, [messages.length, p.id]);

  const jump = () => { const el = scrollRef.current; if (el) el.scrollTo({ top: el.scrollHeight, behavior: "smooth" }); };

  return (
    <section className="relative flex h-full min-w-0 flex-1 flex-col overflow-hidden bg-background">
      <ConversationHeader
        p={p} onToggleCorrector={onToggleCorrector} correctorOpen={correctorOpen}
        onOpenChatSettings={onOpenChatSettings} onBack={onBack} notesCount={notesCount}
        onExpandList={onExpandList}
      />

      <div ref={scrollRef} className="chat-canvas flex-1 overflow-y-auto no-scrollbar px-4 py-2 sm:px-6">
        <div className="mx-auto flex max-w-3xl flex-col gap-2">
          <DayDivider label="Сегодня" />
          {messages.map((m) => (
            <div key={m.id} id={`msg-${m.id}`}>
              <Bubble m={m} active={activeMsgId === m.id} onClick={() => onSelectMsg(m.id)} />
            </div>
          ))}
          <div className="flex items-center gap-2 pl-1 pt-3 text-[11.5px] text-muted-foreground">
            <span>{p.name.split(" ")[0]} печатает</span>
            <span className="inline-flex gap-0.5">
              <span className="h-1 w-1 animate-bounce rounded-full bg-muted-foreground [animation-delay:-0.2s]" />
              <span className="h-1 w-1 animate-bounce rounded-full bg-muted-foreground [animation-delay:-0.1s]" />
              <span className="h-1 w-1 animate-bounce rounded-full bg-muted-foreground" />
            </span>
          </div>
        </div>
      </div>


      {showJump && (
        <button onClick={jump}
          className="absolute bottom-24 right-4 grid h-9 w-9 place-items-center rounded-full bg-surface text-muted-foreground shadow-sm hover:text-ink sm:right-8">
          <ArrowDown className="h-4 w-4" />
        </button>
      )}

      <Composer onSend={onSend} placeholder={`Напишите на ${p.lang}…`} />
    </section>
  );
}

// ---------- Corrector ----------
function Corrector({
  cards, activeMsgId, onJump, onClose, onBack,
}: {
  cards: CorrectorCard[]; activeMsgId: string | null;
  onJump: (id: string) => void; onClose: () => void; onBack?: () => void;
}) {
  return (
    <aside className="flex h-full w-full min-w-0 shrink-0 flex-col overflow-hidden bg-surface shadow-[-1px_0_2px_rgba(20,20,30,0.03)]">
