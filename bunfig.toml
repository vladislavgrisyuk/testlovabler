// ---------- Root ----------
function Index() {
  const isMobile = useIsMobile();
  const shellRef = useRef<HTMLElement>(null);
  const [personas, setPersonas] = useState<Persona[]>(initialPersonas);
  const [activeId, setActiveId] = useState("sofia");
  const [messages, setMessages] = useState<Msg[]>(initialMessages);
  const [activeMsgId, setActiveMsgId] = useState<string | null>("m2");
  const [mobileView, setMobileView] = useState<"list" | "chat" | "corrector">("list");

  const [profileOpen, setProfileOpen] = useState(false);
  const [providerOpen, setProviderOpen] = useState(false);
  const [chatSettingsOpen, setChatSettingsOpen] = useState(false);
  const [newChatOpen, setNewChatOpen] = useState(false);

  const [profile, setProfile] = useState<ProfileState>({
    name: "Alex Petrov", email: "alex@lingua.app", native: "ru", goal: "travel",
    dailyMinutes: 20, notifications: true, sound: false, theme: "light",
  });
  const [provider, setProvider] = useState<ProviderState>({
    provider: "lovable", model: "gemini-3-flash", apiKey: "",
    temperature: 0.7, verbosity: "normal", autoCorrect: true,
  });

  const persona = personas.find((p) => p.id === activeId) ?? personas[0];
  const notesCount = useMemo(
    () => correctorCards.reduce((n, c) => n + (c.notes?.length ?? 0), 0),
    [],
  );

  const handleSend = (text: string) => {
    const id = `u-${Date.now()}`;
    const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    setMessages((m) => [...m, { id, from: "user", text, time }]);
    setActiveMsgId(id);
  };
  const handleJump = (msgId: string) => {
    setActiveMsgId(msgId);
    if (isMobile) setMobileView("chat");
    setTimeout(() => {
      const el = document.getElementById(`msg-${msgId}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
  };
  const savePersona = (updated: Persona) =>
    setPersonas((list) => list.map((p) => (p.id === updated.id ? updated : p)));
  const deletePersona = (id: string) => {
    setPersonas((list) => {
      const next = list.filter((p) => p.id !== id);
      if (id === activeId && next[0]) setActiveId(next[0].id);
      return next;
    });
  };
  const createPersona = (p: Persona) => {
    setPersonas((list) => [p, ...list]);
    setActiveId(p.id);
    setMessages([{ id: "seed", from: "persona", text: `¡Hola! / Hello! Готов(а) поговорить — пишите первое сообщение.`, time: "сейчас" }]);
    setActiveMsgId(null);
    if (isMobile) setMobileView("chat");
  };

  const handleSelectChat = (id: string) => {
    setActiveId(id);
    if (isMobile) setMobileView("chat");
  };
  const [listWidth, setListWidth] = useState(LIST_PANEL.default);
  const [correctorWidth, setCorrectorWidth] = useState(CORRECTOR_PANEL.default);
  const [listCollapsed, setListCollapsed] = useState(false);
  const [correctorCollapsed, setCorrectorCollapsed] = useState(false);
  const [isResizing, setIsResizing] = useState(false);

  const getShellWidth = () => shellRef.current?.clientWidth ?? window.innerWidth;
  const getListMax = (rightWidth = correctorWidth) => {
    const occupiedByRight = correctorCollapsed ? 0 : rightWidth;
    return Math.min(LIST_PANEL.max, getShellWidth() - CENTER_PANEL_MIN - occupiedByRight - RESIZE_RAIL_TOTAL);
  };
  const getCorrectorMax = (leftWidth = listWidth) => {
    const occupiedByLeft = listCollapsed ? 0 : leftWidth;
    return Math.min(CORRECTOR_PANEL.max, getShellWidth() - CENTER_PANEL_MIN - occupiedByLeft - RESIZE_RAIL_TOTAL);
  };

  useEffect(() => {
    if (isMobile) return;
    const keepPanelsInsideViewport = () => {
      setListWidth((w) => (listCollapsed ? w : clamp(w, LIST_PANEL.min, getListMax())));
      setCorrectorWidth((w) => (correctorCollapsed ? w : clamp(w, CORRECTOR_PANEL.min, getCorrectorMax())));
    };
    keepPanelsInsideViewport();
    window.addEventListener("resize", keepPanelsInsideViewport);
    return () => window.removeEventListener("resize", keepPanelsInsideViewport);
  }, [isMobile, listCollapsed, correctorCollapsed]);

  const startListResize = (e: ReactPointerEvent<HTMLDivElement>) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = listWidth;
    setIsResizing(true);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";

    const onMove = (event: PointerEvent) => {
      setListWidth(clamp(startWidth + event.clientX - startX, LIST_PANEL.min, getListMax()));
    };
    const onUp = () => {
      setIsResizing(false);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp, { once: true });
  };

  const startCorrectorResize = (e: ReactPointerEvent<HTMLDivElement>) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = correctorWidth;
    setIsResizing(true);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";

    const onMove = (event: PointerEvent) => {
      setCorrectorWidth(clamp(startWidth - (event.clientX - startX), CORRECTOR_PANEL.min, getCorrectorMax()));
    };
    const onUp = () => {
      setIsResizing(false);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp, { once: true });
  };

  const handleToggleCorrector = () => {
    if (isMobile) {
      setMobileView((v) => (v === "corrector" ? "chat" : "corrector"));
      return;
    }
    if (correctorCollapsed) {
      setCorrectorWidth((w) => clamp(Math.max(w, CORRECTOR_PANEL.default), CORRECTOR_PANEL.min, getCorrectorMax()));
      setCorrectorCollapsed(false);
    } else {
      setCorrectorCollapsed(true);
    }
  };
  const handleExpandList = () => {
    setListWidth((w) => clamp(Math.max(w, LIST_PANEL.default), LIST_PANEL.min, getListMax()));
    setListCollapsed(false);
  };
  const handleCollapseList = () => {
    setListCollapsed(true);
  };

  const sidebarNode = (
    <Sidebar
      personas={personas} activeId={activeId} onSelect={handleSelectChat}
      onNewChat={() => setNewChatOpen(true)}
      onOpenProfile={() => setProfileOpen(true)}
      onOpenProvider={() => setProviderOpen(true)}
      onCollapse={isMobile ? undefined : handleCollapseList}
    />
  );
  const centerNode = (
    <Center
      p={persona} messages={messages} activeMsgId={activeMsgId}
      onSelectMsg={setActiveMsgId} onSend={handleSend}
      onToggleCorrector={handleToggleCorrector} correctorOpen={!correctorCollapsed}
      onOpenChatSettings={() => setChatSettingsOpen(true)}
      onBack={isMobile ? () => setMobileView("list") : undefined}
      notesCount={notesCount}
      onExpandList={!isMobile && listCollapsed ? handleExpandList : undefined}
    />
  );
  const correctorNode = (
    <Corrector
      cards={correctorCards} activeMsgId={activeMsgId}
      onJump={handleJump} onClose={handleToggleCorrector}
      onBack={isMobile ? () => setMobileView("chat") : undefined}
    />
  );

  const panelMotion = isResizing ? "" : "transition-[width] duration-200 ease-out";

  return (
    <main ref={shellRef} className="flex h-[100dvh] w-full overflow-hidden bg-background text-foreground">
      {isMobile ? (
        <>
          {mobileView === "list" && sidebarNode}
          {mobileView === "chat" && centerNode}
          {mobileView === "corrector" && correctorNode}
        </>
      ) : (
        <div className="flex h-full w-full min-w-0 overflow-hidden">
          {!listCollapsed && (
            <div
              className={`h-full shrink-0 overflow-hidden ${panelMotion}`}
              style={{ width: listWidth, minWidth: LIST_PANEL.min, maxWidth: LIST_PANEL.max }}
            >
              {sidebarNode}
            </div>
          )}
          {!listCollapsed && <ResizeRail label="Изменить ширину списка чатов" onPointerDown={startListResize} />}
          <div className="h-full min-w-0 flex-1 overflow-hidden">
            {centerNode}
          </div>
          {!correctorCollapsed && <ResizeRail label="Изменить ширину панели разбора" onPointerDown={startCorrectorResize} />}
          {!correctorCollapsed && (
            <div
              className={`h-full shrink-0 overflow-hidden ${panelMotion}`}
              style={{ width: correctorWidth, minWidth: CORRECTOR_PANEL.min, maxWidth: CORRECTOR_PANEL.max }}
            >
              {correctorNode}
            </div>
          )}
        </div>

      )}

      <ProfileSettings open={profileOpen} onClose={() => setProfileOpen(false)} state={profile} onSave={setProfile} />
      <ProviderSettings open={providerOpen} onClose={() => setProviderOpen(false)} state={provider} onSave={setProvider} />
      <ChatSettings open={chatSettingsOpen} onClose={() => setChatSettingsOpen(false)}
        persona={persona} onSave={savePersona} onDelete={deletePersona} />
      <NewChatModal open={newChatOpen} onClose={() => setNewChatOpen(false)} onCreate={createPersona} />
    </main>
  );
}
